<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>BE 연동 계산기 과제</title>
</head>
<body>
    <h2>Vercel FE+BE 배포 과제 (덧셈 계산기)</h2>
    <input id="num1" type="number" placeholder="첫 번째 숫자"> +
    <input id="num2" type="number" placeholder="두 번째 숫자">
    <button onclick="doAdd()">더하기 실행</button>
    
    <h3 id="display">결과가 여기 표시됩니다.</h3>

    <script>
        async function doAdd() {
            const n1 = document.getElementById('num1').value;
            const n2 = document.getElementById('num2').value;
            
            // 우리가 만든 api/add.js 호출
            const response = await fetch(`/api/add?a=${n1}&b=${n2}`);
            const data = await response.json();
            
            document.getElementById('display').innerText = `서버 계산 결과: ${data.result}`;
        }
    </script>
</body>
</html>
